<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Annapurna Edits</title>
<link rel="stylesheet" href="login.css">
</head>
<body>
<div class="login-container">
  <div class="login-card">
    <h1 class="logo">Annapurna Edits</h1>
    <p class="tagline">Login to continue</p>
    
    <form id="loginForm">
      <input type="text" id="username" placeholder="Username" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit" class="login-btn">Login</button>
    </form>
    <p class="info-text">Users: Alice, Bob, Charlie | Admin: admin123</p>
  </div>
</div>

<script>
const users = ["Alice", "Bob", "Charlie"];
const adminPass = "admin123";

document.getElementById("loginForm").addEventListener("submit", function(e){
  e.preventDefault();
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();

  if(users.includes(username)){
    localStorage.setItem("currentUser", username);
    localStorage.removeItem("admin"); // remove admin
    window.location.href = "recipes.html";
  } else if(username === "admin" && password === adminPass){
    localStorage.setItem("admin","true"); // string "true"
    localStorage.removeItem("currentUser");
    window.location.href = "recipes.html";
  } else {
    alert("Invalid credentials");
  }
});
</script>
</body>
</html>
